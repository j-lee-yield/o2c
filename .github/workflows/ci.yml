name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test -- --env-mode=loose
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/o2c_test"
          REDIS_URL: "redis://localhost:6379"
          DEFAULT_TENANT_SLUG: "demo"
          JWT_ISSUER: "o2c-test"
          JWT_AUDIENCE: "o2c-test"
          JWT_PUBLIC_KEY: "test-public-key"
          JWT_PRIVATE_KEY: "test-private-key"