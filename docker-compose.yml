services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: o2c
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    env_file:
      - .env.example
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
